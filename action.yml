name: "Notify Slack"
description: "Sends Slack notifications when builds fail. Supports threaded replies when slack-channel is provided."
author: "514 Labs"

inputs:
  slack-bot-token:
    description: 'Slack Bot Token for user lookup'
    required: true
  slack-webhook-url:
    description: 'Slack Webhook URL for notifications'
    required: true
  slack-channel:
    description: 'Slack channel ID or name (e.g., #general or C1234567890). Required for threaded replies with additional-message.'
    required: false
    default: 'C08DZVDM56G'
  additional-message:
    description: 'Additional message to add to the notification'
    required: false
  github-token:
    description: 'GitHub token used to read commit authors and organization-verified emails. Organization member access is required for company-email lookup.'
    required: false
    default: ''
  github-organization:
    description: 'GitHub organization whose verified-domain emails should be used for Slack lookup. Defaults to the repository owner.'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Resolve notification author
      id: notification-author
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      env:
        GITHUB_ORGANIZATION: ${{ inputs.github-organization || github.repository_owner }}
        SLACK_BOT_TOKEN: ${{ inputs.slack-bot-token }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const authorsQuery = `
            query CommitAuthors($owner: String!, $repo: String!, $oid: GitObjectID!) {
              repository(owner: $owner, name: $repo) {
                object(oid: $oid) {
                  ... on Commit {
                    authors(first: 50) {
                      nodes { email name user { login } }
                    }
                  }
                }
              }
            }
          `;
          const organizationEmailsQuery = `
            query OrganizationEmails($login: String!, $organization: String!) {
              user(login: $login) {
                organizationVerifiedDomainEmails(login: $organization)
              }
            }
          `;

          let authors = [];
          try {
            const result = await github.graphql(authorsQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              oid: context.sha,
            });
            authors = (result.repository?.object?.authors?.nodes ?? []).map((author) => ({
              email: author.email ?? '',
              login: author.user?.login ?? '',
              name: author.name ?? '',
            }));
          } catch (error) {
            core.warning(`Could not read commit authors from GitHub: ${error.message}`);
          }

          if (authors.length === 0) {
            const eventAuthor = context.payload?.head_commit?.author;
            authors = [{
              email: eventAuthor?.email ?? '',
              login: eventAuthor?.username ?? context.actor ?? '',
              name: eventAuthor?.name ?? context.actor ?? 'unknown',
            }];
          }

          const isAutomation = (author) => {
            const login = author.login.toLowerCase();
            const name = author.name.toLowerCase();
            const email = author.email.toLowerCase();
            return login.endsWith('[bot]') ||
              login.endsWith('-bot') ||
              name.startsWith('bot-') ||
              email === 'noreply@anthropic.com';
          };
          const humanAuthors = authors.filter((author) => !isAutomation(author));
          const candidates = humanAuthors.length > 0 ? humanAuthors : authors;
          let organizationLookupAvailable = true;

          for (const author of candidates) {
            let organizationEmails = [];
            if (organizationLookupAvailable && author.login) {
              try {
                const result = await github.graphql(organizationEmailsQuery, {
                  login: author.login,
                  organization: process.env.GITHUB_ORGANIZATION,
                });
                organizationEmails = result.user?.organizationVerifiedDomainEmails ?? [];
              } catch (error) {
                organizationLookupAvailable = false;
                core.warning(
                  `Could not read organization-verified GitHub emails; ` +
                  `provide a GitHub token with organization member access: ${error.message}`,
                );
              }
            }

            const emails = [...new Set([...organizationEmails, author.email]
              .map((email) => email.trim().toLowerCase())
              .filter(Boolean))];
            for (const email of emails) {
              try {
                const response = await fetch(
                  `https://slack.com/api/users.lookupByEmail?email=${encodeURIComponent(email)}`,
                  { headers: { Authorization: `Bearer ${process.env.SLACK_BOT_TOKEN}` } },
                );
                const data = await response.json();
                if (
                  data.ok &&
                  data.user &&
                  !data.user.deleted &&
                  !data.user.is_bot &&
                  !data.user.is_app_user
                ) {
                  return {
                    githubLogin: author.login,
                    name: author.name,
                    slackUserId: data.user.id,
                  };
                }
                if (!data.ok && data.error !== 'users_not_found') {
                  core.warning(`Slack user lookup failed: ${data.error ?? 'unknown_error'}`);
                }
              } catch (error) {
                core.warning(`Slack user lookup failed: ${error.message}`);
              }
            }
          }

          return {
            githubLogin: candidates[0]?.login ?? context.actor ?? '',
            name: candidates[0]?.name ?? context.actor ?? 'unknown',
            slackUserId: null,
          };

    - name: Construct Slack payload
      id: slack-payload
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        result-encoding: string
        script: |
          const workflowName = context.workflow;
          const author = JSON.parse(process.env.NOTIFICATION_AUTHOR);
          const authorDisplay = author.slackUserId
            ? `<@${author.slackUserId}>`
            : author.githubLogin
              ? `<https://github.com/${author.githubLogin}|@${author.githubLogin}>`
              : author.name;

          const message = `🚨 ${workflowName} failed!

          Workflow: ${workflowName}
          Repo: ${context.repo.owner}/${context.repo.repo}
          Branch: ${context.ref.replace('refs/heads/', '')}
          Commit: ${context.sha}
          Author: ${authorDisplay}
          See: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

          const payload = { text: message };
          return JSON.stringify(payload, null, 2);
      env:
        NOTIFICATION_AUTHOR: ${{ steps.notification-author.outputs.result }}

    - name: Send main Slack notification (Webhook Mode)
      if: ${{ inputs.slack-channel == '' }}
      uses: slackapi/slack-github-action@6c661ce58804a1a20f6dc5fbee7f0381b469e001 # v1.25.0
      with:
        payload: ${{ steps.slack-payload.outputs.result }}
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack-webhook-url }}

    - name: Send main Slack notification (Bot Token Mode)
      id: slack-notification-bot-actual
      if: ${{ inputs.slack-channel != '' }}
      uses: slackapi/slack-github-action@6c661ce58804a1a20f6dc5fbee7f0381b469e001 # v1.25.0
      with:
        channel-id: ${{ inputs.slack-channel }}
        payload: ${{ steps.slack-payload.outputs.result }}
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack-bot-token }}

    - name: Construct threaded reply payload
      id: thread-payload
      if: ${{ inputs.additional-message != '' && inputs.slack-channel != '' }}
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        result-encoding: string
        script: |
          const additionalMessage = process.env.ADDITIONAL_MESSAGE;
          const threadTs = process.env.THREAD_TS;

          const payload = {
            text: additionalMessage,
            thread_ts: threadTs
          };

          return JSON.stringify(payload, null, 2);
      env:
        ADDITIONAL_MESSAGE: ${{ inputs.additional-message }}
        THREAD_TS: ${{ steps.slack-notification-bot-actual.outputs.ts }}

    - name: Send additional message as threaded reply
      if: ${{ inputs.additional-message != '' && inputs.slack-channel != '' }}
      uses: slackapi/slack-github-action@6c661ce58804a1a20f6dc5fbee7f0381b469e001 # v1.25.0
      with:
        channel-id: ${{ inputs.slack-channel }}
        payload: ${{ steps.thread-payload.outputs.result }}
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack-bot-token }}
